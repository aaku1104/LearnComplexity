<!-- Main Navbar -->
<nav class="bg-white shadow-sm sticky top-0 z-50">
  <div class="container mx-auto px-4 lg:px-16 flex items-center justify-between h-16">

    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2">
      <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center">
        <span class="text-white font-bold text-sm">LC</span>
      </div>
      <div class="leading-tight">
        <p class="font-extrabold text-[#1a2340] text-sm uppercase tracking-wider">LEARN</p>
        <p class="font-bold text-blue-500 text-xs uppercase tracking-widest">COMPLEXITY</p>
      </div>
    </a>

    <!-- Desktop Nav -->
    <div class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-700">
      <a routerLink="/" routerLinkActive="text-blue-600" class="hover:text-blue-600 transition">Home</a>
      <a routerLink="/about" routerLinkActive="text-blue-600" class="hover:text-blue-600 transition">About US</a>

      <!-- Courses Dropdown -->
      <div class="relative group">
        <button class="flex items-center gap-1 hover:text-blue-600 transition">
          Courses
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </button>
        <div class="absolute top-full left-0 bg-white shadow-xl rounded-lg py-2 min-w-48 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">Web Development</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">Data Science</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">UI/UX Design</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition">Mobile Development</a>
        </div>
      </div>

      <a routerLink="/blogs" routerLinkActive="text-blue-600" class="hover:text-blue-600 transition">Blogs</a>
      <a routerLink="/contact" routerLinkActive="text-blue-600" class="text-blue-600 font-semibold">Contact Us</a>
    </div>

    <!-- Auth Buttons -->
    <div class="hidden md:flex items-center gap-3">
      <a routerLink="/login" class="border border-blue-600 text-blue-600 hover:bg-blue-50 font-semibold px-5 py-2 rounded-lg text-sm transition">Sign in</a>
      <a routerLink="/register" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-lg text-sm transition shadow-md">Register</a>
    </div>

    <!-- Mobile Hamburger -->
    <button class="md:hidden text-gray-700" (click)="toggleMobileMenu()">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path *ngIf="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        <path *ngIf="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="mobileMenuOpen" class="md:hidden bg-white border-t border-gray-100 px-4 py-4 space-y-3 text-sm">
    <a routerLink="/" class="block text-gray-700 hover:text-blue-600 py-2">Home</a>
    <a routerLink="/about" class="block text-gray-700 hover:text-blue-600 py-2">About US</a>
    <a routerLink="/courses" class="block text-gray-700 hover:text-blue-600 py-2">Courses</a>
    <a routerLink="/blogs" class="block text-gray-700 hover:text-blue-600 py-2">Blogs</a>
    <a routerLink="/contact" class="block text-blue-600 font-semibold py-2">Contact Us</a>
    <div class="flex gap-3 pt-2">
      <a routerLink="/login" class="border border-blue-600 text-blue-600 px-4 py-2 rounded-lg">Sign in</a>
      <a routerLink="/register" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Register</a>
    </div>
  </div>
</nav>
