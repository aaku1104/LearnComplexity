<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Utility Bar ── */
  .hdr-utility {
    width: 100%;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .hdr-utility__inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .hdr-utility__contact {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .hdr-utility__item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #1f2937;
    text-decoration: none;
    font-weight: 500;
  }
  .hdr-utility__item svg {
    flex-shrink: 0;
    color: #374151;
  }
  .hdr-utility__socials {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .hdr-social-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #374151;
    transition: color 0.18s;
    text-decoration: none;
  }
  .hdr-social-icon:hover { color: #2563EB; }

  /* ── Main Nav ── */
  .hdr-nav {
    width: 100%;
    background: #fff;
    border-bottom: 2px solid #e5e7eb;
    font-family: 'Plus Jakarta Sans', sans-serif;
    position: relative;
    z-index: 100;
  }
  .hdr-nav__inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  /* Logo */
  .hdr-logo {
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    flex-shrink: 0;
  }

  /* Nav links */
  .hdr-links {
    display: flex;
    align-items: center;
    gap: 0;
    list-style: none;
    flex: 1;
    justify-content: center;
  }
  .hdr-links__item {
    position: relative;
  }
  .hdr-links__a {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 8px 28px;
    font-size: 19px;
    font-weight: 500;
    color: #1f2937;
    text-decoration: none;
    border-radius: 6px;
    transition: color 0.18s, background 0.18s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .hdr-links__a:hover { color: #2563EB; background: #f0f4ff; }
  .hdr-links__a--active { color: #2563EB; }

  /* Dropdown chevron */
  .hdr-chevron {
    width: 16px;
    height: 16px;
  }

  /* Dropdown menu */
  .hdr-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    min-width: 180px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    padding: 6px 0;
    z-index: 200;
  }
  .hdr-dropdown a {
    display: block;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    color: #1f2937;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .hdr-dropdown a:hover { background: #f0f4ff; color: #2563EB; }

  /* CTA buttons */
  .hdr-ctas {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .hdr-btn-signin {
    padding: 10px 28px;
    border: 2px solid #1E2D6B;
    border-radius: 10px;
    background: transparent;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #1E2D6B;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
    white-space: nowrap;
  }
  .hdr-btn-signin:hover { background: #1E2D6B; color: #fff; }
  .hdr-btn-register {
    padding: 10px 28px;
    border: 2px solid #2563EB;
    border-radius: 10px;
    background: #2563EB;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s;
    white-space: nowrap;
  }
  .hdr-btn-register:hover { background: #1d4ed8; border-color: #1d4ed8; }

  /* Mobile hamburger */
  .hdr-hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }
  .hdr-hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: #1f2937;
    border-radius: 2px;
    transition: all 0.2s;
  }

  /* Mobile nav drawer */
  .hdr-mobile-menu {
    display: none;
    flex-direction: column;
    background: #fff;
    border-top: 1px solid #e5e7eb;
    padding: 16px 24px 24px;
    gap: 4px;
  }
  .hdr-mobile-menu a {
    display: block;
    padding: 11px 8px;
    font-size: 15px;
    font-weight: 500;
    color: #1f2937;
    text-decoration: none;
    border-bottom: 1px solid #f3f4f6;
  }
  .hdr-mobile-menu a:last-child { border-bottom: none; }
  .hdr-mobile-ctas {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .hdr-mobile-ctas button { flex: 1; }

  @media (max-width: 900px) {
    /* Hide utility bar entirely on mobile */
    .hdr-utility { display: none; }

    .hdr-links { display: none; }
    .hdr-ctas  { display: none; }
    .hdr-hamburger { display: flex; }

    .hdr-nav__inner { padding: 0 16px; }
  }

  @media (max-width: 600px) {
    .hdr-nav__inner { padding: 0 16px; }
  }

  /* Tablet breakpoint - 1024px */
  @media (max-width: 1024px) {
    .hdr-nav__inner {
      max-width: 100%;
      padding: 0 24px;
    }
    .hdr-links__a {
      padding: 8px 20px;
      font-size: 18px;
    }
    .hdr-btn-signin, .hdr-btn-register {
      padding: 8px 20px;
      font-size: 14px;
    }
  }

  /* Large desktop breakpoint - 2560px */
  @media (min-width: 2560px) {
    .hdr-nav__inner {
      max-width: 1600px;
      padding: 0 60px;
      height: 90px;
    }
    .hdr-links__a {
      padding: 10px 32px;
      font-size: 20px;
    }
    .hdr-btn-signin, .hdr-btn-register {
      padding: 12px 32px;
      font-size: 16px;
    }
    .hdr-logo img {
      height: 40px;
    }
  }
</style>

<!-- ===== MAIN NAV ===== -->
<nav class="hdr-nav" role="navigation" aria-label="Main navigation">
  <div class="hdr-nav__inner">

    <!-- Logo -->
    <a href="/home" class="hdr-logo" aria-label="Learn Complexity home page">
      <img ngSrc="assets/images/lc-logo.webp" alt="Learn Complexity Logo Icon representing algorithm complexity education platform"
           width="32" height="32"
           style="height: 32px; width: auto; object-fit: contain; display: block;"/>
      <img ngSrc="assets/images/logo-text.webp" alt="Learn Complexity text logo for algorithm complexity education platform"
           width="120" height="32"
           style="height: 32px; width: auto; object-fit: contain; display: block;"/>
    </a>

    <!-- Nav links -->
    <ul class="hdr-links" role="menubar">
      <li class="hdr-links__item" role="none">
        <a href="/home" class="hdr-links__a" role="menuitem" [attr.aria-current]="isActive({ label: 'Home', route: '/home' }) ? 'page' : null">Home</a>
      </li>
      <li class="hdr-links__item" role="none">
        <a href="/about" class="hdr-links__a" role="menuitem" [attr.aria-current]="isActive({ label: 'About Us', route: '/about' }) ? 'page' : null">About US</a>
      </li>
      <li class="hdr-links__item" role="none">
        <a href="/courses" class="hdr-links__a" role="menuitem" aria-haspopup="true" aria-expanded="false" [attr.aria-current]="isActive({ label: 'Courses', route: '/courses' }) ? 'page' : null">
          Courses
          <svg class="hdr-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="4,6 8,10 12,6"/>
          </svg>
        </a>
        <div class="hdr-dropdown" role="menu" aria-label="Courses submenu">
          <a href="/courses" role="menuitem">All Courses</a>
          <a href="/courses/sap" role="menuitem">SAP Training</a>
          <a href="/courses/elearning" role="menuitem">eLearning</a>
          <a href="/courses/certifications" role="menuitem">Certifications</a>
        </div>
      </li>
      <li class="hdr-links__item" role="none">
        <a href="#" class="hdr-links__a" role="menuitem" (click)="onNavClick({ label: 'Blogs', route: '/blogs' }, $event)">Blogs</a>
      </li>
      <li class="hdr-links__item" role="none">
        <a href="/contact" class="hdr-links__a" role="menuitem" [attr.aria-current]="isActive({ label: 'Contact Us', route: '/contact' }) ? 'page' : null">Contact Us</a>
      </li>
    </ul>

    <!-- CTA buttons -->
    <div class="hdr-ctas">
      <button class="hdr-btn-signin" aria-label="Sign in to your account">Sign in</button>
      <button class="hdr-btn-register" aria-label="Create a new account">Register</button>
    </div>

    <!-- Hamburger (mobile) -->
    <button class="hdr-hamburger" aria-label="Menu" onclick="
      var m = document.getElementById('hdr-mobile');
      m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    ">
      <span></span><span></span><span></span>
    </button>

  </div>

  <!-- Mobile menu drawer -->
  <div class="hdr-mobile-menu" id="hdr-mobile">
    <a href="/home">Home</a>
    <a href="/about">About US</a>
    <a href="/courses">Courses ▾</a>
    <a href="#" (click)="onNavClick({ label: 'Blogs', route: '/blogs' }, $event)">Blogs</a>
    <a href="/contact">Contact Us</a>
    <div class="hdr-mobile-ctas">
      <button class="hdr-btn-signin" style="flex:1;">Sign in</button>
      <button class="hdr-btn-register" style="flex:1;">Register</button>
    </div>
  </div>
</nav>
